<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>H&S Group — Planning 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f7fa;
  --white:#ffffff;
  --b1:#e4e8ef;
  --b2:#c8d0de;
  --text:#111827;
  --sub:#6b7a99;
  --sub2:#9aa3b8;
  --navy:#1a2a4a;
  --blue:#2a5298;
  --mid:#3d6ec2;
  --light:#6a9fd4;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.05);
  --sh2:0 8px 28px rgba(0,0,0,.12);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ══ TOPBAR ══════════════════════════════════════ */
.topbar{
  background:var(--white);border-bottom:1px solid var(--b1);
  height:58px;padding:0 24px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  box-shadow:0 1px 0 var(--b1);
}
.logo{height:36px;object-fit:contain;display:block}
.topbar-right{display:flex;align-items:center;gap:20px}
.kpis{display:flex;gap:20px;align-items:center}
.kpi{text-align:right}
.kpi-v{font-size:17px;font-weight:700;color:var(--blue);line-height:1}
.kpi-l{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--sub2);margin-top:2px}
.btn-edit{
  display:flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:8px;
  background:var(--blue);color:#fff;
  border:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;transition:background .15s;white-space:nowrap;
}
.btn-edit:hover{background:var(--navy)}
.btn-edit svg{flex-shrink:0}
.btn-import{
  display:flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:8px;
  background:var(--white);color:var(--blue);
  border:1.5px solid var(--blue);
  font-family:'Inter',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn-import:hover{background:#eef4fc}
.btn-import svg{flex-shrink:0}
/* import overlay */
.import-overlay{
  position:fixed;inset:0;background:rgba(26,42,74,.55);
  z-index:500;display:none;align-items:center;justify-content:center;
}
.import-overlay.open{display:flex}
.import-box{
  background:var(--white);border-radius:14px;padding:28px 32px;
  width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center;
}
.import-spinner{
  width:36px;height:36px;border-radius:50%;
  border:3px solid var(--b1);border-top-color:var(--blue);
  animation:spin .7s linear infinite;margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.import-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
.import-sub{font-size:12px;color:var(--sub)}
.import-ok{font-size:22px;margin-bottom:10px}
.import-stats{
  display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:14px 0;
}
.import-stat{
  background:var(--bg);border:1px solid var(--b1);border-radius:8px;
  padding:8px 16px;text-align:center;
}
.import-stat-v{font-size:18px;font-weight:700;color:var(--blue)}
.import-stat-l{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px}
.import-err{color:#c84848;font-size:12px;margin-top:8px;line-height:1.5}


/* ══ FILTER BAR ══════════════════════════════════ */
.fbar{
  background:var(--white);border-bottom:1px solid var(--b1);
  padding:0 24px;flex-shrink:0;
  display:flex;gap:0;overflow-x:auto;scrollbar-width:none;
}
.fbar::-webkit-scrollbar{display:none}
.ftab{
  padding:0 18px;height:40px;display:flex;align-items:center;gap:6px;
  font-size:11.5px;font-weight:500;color:var(--sub);
  cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;
  transition:color .14s,border-color .14s;user-select:none;
}
.ftab:hover{color:var(--text)}
.ftab.on{color:var(--blue);border-bottom-color:var(--blue)}
.tab-icon{display:flex;align-items:center;opacity:.7}
.ftab.on .tab-icon{opacity:1}

/* ══ CHIP ROW ════════════════════════════════════ */
.cbar{
  background:var(--bg);border-bottom:1px solid var(--b1);
  padding:7px 24px;min-height:44px;
  display:flex;gap:6px;align-items:center;flex-wrap:wrap;flex-shrink:0;
}
.cbar-hint{font-size:11px;color:var(--sub);font-style:italic}
.chip{
  padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500;
  cursor:pointer;border:1.5px solid;transition:opacity .14s;user-select:none;
}
.chip.on{opacity:1}.chip.off{opacity:.22}
.chip:hover{opacity:.7}

/* ══ BODY ════════════════════════════════════════ */
.body{display:flex;flex:1;overflow:hidden}

/* ══ SIDEBAR ═════════════════════════════════════ */
.sidebar{
  width:0;flex-shrink:0;overflow:hidden;
  background:var(--white);border-right:1px solid var(--b1);
  display:flex;flex-direction:column;
  transition:width .25s cubic-bezier(.4,0,.2,1);
}
.sidebar.open{width:300px}
.sb-inner{width:300px;display:flex;flex-direction:column;height:100%;overflow:hidden}
.sb-head{
  padding:14px 16px;border-bottom:1px solid var(--b1);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.sb-head-title{font-size:12px;font-weight:600;color:var(--text)}
.sb-close{width:24px;height:24px;border-radius:6px;border:1px solid var(--b1);background:none;cursor:pointer;font-size:12px;color:var(--sub);display:flex;align-items:center;justify-content:center;transition:all .14s}
.sb-close:hover{background:var(--bg);color:var(--text)}
.sb-scroll{flex:1;overflow-y:auto;padding:14px 16px}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* sidebar sections */
.sb-sec{margin-bottom:22px}
.sb-sec-t{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--sub2);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--b1)}
.fl{margin-bottom:8px}
.fl label{display:block;font-size:10.5px;font-weight:500;color:var(--sub);margin-bottom:3px}
.fi,.fs{
  width:100%;padding:6px 9px;border:1px solid var(--b1);border-radius:7px;
  font-family:'Inter',sans-serif;font-size:11.5px;color:var(--text);background:var(--bg);
  outline:none;transition:border .14s;
}
.fi:focus,.fs:focus{border-color:var(--mid)}
.fb{
  width:100%;padding:7px;border-radius:7px;border:none;
  background:var(--blue);color:#fff;
  font-family:'Inter',sans-serif;font-size:11.5px;font-weight:600;
  cursor:pointer;transition:background .14s;margin-top:4px;
}
.fb:hover{background:var(--navy)}

/* color pickers */
.color-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--b1)}
.color-row:last-child{border:none}
.color-label{font-size:11px;color:var(--text);display:flex;align-items:center;gap:7px}
.color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.color-input{width:32px;height:22px;border:1px solid var(--b1);border-radius:5px;padding:1px;cursor:pointer;background:none}

/* visibility toggles */
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--b1)}
.tog-row:last-child{border:none}
.tog-label{font-size:11px;color:var(--text);display:flex;align-items:center;gap:7px}
.tog{width:30px;height:17px;border-radius:9px;background:var(--b2);cursor:pointer;position:relative;transition:background .18s;flex-shrink:0}
.tog.on{background:var(--blue)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:transform .18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog.on::after{transform:translateX(13px)}

/* event list */
.eli{
  display:flex;align-items:flex-start;gap:7px;padding:7px 9px;
  border:1px solid var(--b1);border-radius:7px;background:var(--bg);
  margin-bottom:5px;
}
.eli:hover{border-color:var(--b2)}
.eli-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0;margin-top:3px}
.eli-info{flex:1;min-width:0}
.eli-name{font-size:11px;font-weight:500;color:var(--text);line-height:1.3}
.eli-meta{font-size:9.5px;color:var(--sub);margin-top:1px}
.eli-actions{display:flex;gap:3px;flex-shrink:0}
.eli-btn{width:19px;height:19px;border-radius:4px;border:none;background:none;cursor:pointer;font-size:11px;color:var(--sub2);display:flex;align-items:center;justify-content:center;transition:all .14s}
.eli-btn:hover{background:#fde8e8;color:#c84848}
.eli-btn.edit:hover{background:#eef4fc;color:var(--blue)}

/* ══ ROADMAP AREA ════════════════════════════════ */
.rmap-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.rmap-scroll{flex:1;overflow-y:auto;padding:20px 24px 60px}
.rmap-scroll::-webkit-scrollbar{width:4px}
.rmap-scroll::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* density */
.density{
  background:var(--white);border:1px solid var(--b1);border-radius:12px;
  padding:16px 20px;margin-bottom:16px;box-shadow:var(--sh);
}
.density-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--sub);margin-bottom:12px}
.d-cols{display:grid;grid-template-columns:repeat(12,1fr);gap:6px;align-items:flex-end;height:64px}
.dc{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:opacity .14s}
.dc:hover{opacity:.75}
.dc-bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height .45s cubic-bezier(.34,1.56,.64,1)}
.dc-n{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--sub2)}
.dc-c{font-size:9.5px;font-weight:600;color:var(--sub2);height:14px;display:flex;align-items:center}
.dc.hi .dc-n,.dc.hi .dc-c{color:var(--blue)}
.dc.hi .dc-bar{outline:2px solid var(--blue);outline-offset:1px}

/* roadmap card */
.rcard{background:var(--white);border:1px solid var(--b1);border-radius:12px;overflow:hidden;box-shadow:var(--sh)}

/* axis */
.axis{display:grid;grid-template-columns:repeat(12,1fr);border-bottom:2px solid var(--b1);background:var(--white);position:sticky;top:0;z-index:10}
.am{
  padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;
  border-right:1px solid var(--b1);cursor:pointer;transition:background .14s;user-select:none;
}
.am:last-child{border-right:none}
.am:hover{background:#f8f9fc}
.am.now{background:#edf3fc}
.am.zoom{background:#dde9f8}
.am-tk{width:1.5px;background:var(--b2)}
.am.now .am-tk{background:var(--blue);width:2px}
.am-n{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--sub2)}
.am.now .am-n{color:var(--blue)}
.am.zoom .am-n{color:var(--navy)}
.am-c{font-size:8.5px;color:var(--sub2);font-weight:500}
.am.now .am-c{color:var(--mid)}
.now-pip{width:5px;height:5px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 3px rgba(42,82,152,.15)}

/* events grid */
.egrid{display:grid;grid-template-columns:repeat(12,1fr)}
.mc{
  padding:6px 4px;border-right:1px solid var(--b1);
  display:flex;flex-direction:column;gap:3px;
  cursor:pointer;transition:background .14s;min-height:50px;
}
.mc:last-child{border-right:none}
.mc:hover{background:#fafbfd}
.mc.now{background:#f5f9ff}
.mc.zoom{background:#eef4fc}

/* event pills */
.ep{
  padding:3px 6px;border-radius:4px;border-left:2.5px solid;
  font-size:9.5px;line-height:1.35;font-weight:500;
  cursor:pointer;word-break:break-word;
  transition:transform .12s,box-shadow .12s;
  animation:pu .2s ease both;
}
@keyframes pu{from{opacity:0;transform:translateY(2px)}to{opacity:1;transform:none}}
.ep:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.ep-more{font-size:8.5px;color:var(--sub);text-align:center;padding:2px 4px;border-radius:3px;background:var(--bg);border:1px dashed var(--b2)}

/* zoom panel */
.zpanel{display:none;border-top:2px solid var(--b1);background:var(--bg);padding:18px 20px;animation:sd .18s ease}
.zpanel.open{display:block}
@keyframes sd{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.zh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.zt{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:10px}
.zs{font-size:11px;color:var(--sub);font-weight:400}
.zbtn{padding:4px 11px;border-radius:6px;border:1px solid var(--b1);background:var(--white);font-size:11px;color:var(--sub);cursor:pointer;transition:all .14s}
.zbtn:hover{border-color:var(--b2);color:var(--text)}
.zgrid{display:flex;flex-wrap:wrap;gap:8px}
.zc{
  background:var(--white);border:1px solid var(--b1);border-radius:8px;
  padding:10px 12px;min-width:180px;max-width:230px;
  border-top:3px solid;box-shadow:var(--sh);
  transition:transform .14s,box-shadow .14s;animation:pu .18s ease both;
}
.zc:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.zc-n{font-size:11.5px;font-weight:600;line-height:1.4;margin-bottom:7px;color:var(--text)}
.zc-m{display:flex;gap:4px;flex-wrap:wrap}
.zb{padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}

/* legend */
.legend{border-top:1px solid var(--b1);background:var(--white);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.leg-t{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--sub2)}
.leg{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--sub)}
.leg-d{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* edit modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--white);border-radius:14px;padding:24px;width:340px;box-shadow:var(--sh2)}
.modal-t{font-size:14px;font-weight:700;margin-bottom:16px;color:var(--text)}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-btn{flex:1;padding:7px;border-radius:7px;border:1px solid var(--b1);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .14s}
.modal-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.modal-btn.primary:hover{background:var(--navy)}
.modal-btn:hover{background:var(--bg)}

/* toast */
.toast{position:fixed;bottom:22px;right:22px;z-index:200;background:var(--navy);color:#fff;padding:9px 16px;border-radius:8px;font-size:12px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);transform:translateY(50px);opacity:0;transition:all .22s ease;pointer-events:none}
.toast.show{transform:none;opacity:1}

/* tooltip */
#tip{position:fixed;z-index:300;pointer-events:none;background:var(--navy);color:#e8eef8;border-radius:9px;padding:10px 14px;max-width:220px;font-size:11.5px;opacity:0;transition:opacity .1s;box-shadow:0 6px 24px rgba(0,0,0,.2)}
#tip.on{opacity:1}
#tip .tn{font-weight:600;font-size:12.5px;margin-bottom:6px;line-height:1.4}
#tip .tr{color:rgba(200,215,240,.65);margin-top:2px}
#tip .tr span{color:#e8eef8}
#tip .tb{display:inline-block;margin-top:6px;padding:2px 7px;border-radius:3px;font-size:9.5px;font-weight:600}
</style>
</head>

function filtered(){
  const tab = TABS.find(t=>t.id===activeTab);
  return EVTS.filter(d=>{
    if(hidden.has(d.g)) return false;
    if(!tab.opts || selected.size===0) return true;
    if(tab.id==='groupe') return selected.has(d.g);
    if(tab.id==='bu')     return selected.has(d.bu);
    if(tab.id==='entite') return selected.has(d.e);
    if(tab.id==='type')   return selected.has(d.t);
    return true;
  });
}
function optColor(tid,opt){
  if(tid==='groupe') return GC[opt]||'#888';
  if(tid==='type')   return TC[opt]?.c||'#888';
  if(tid==='bu'){    const e=EVTS.find(d=>d.bu===opt); return e?GC[e.g]:'#888'; }
  if(tid==='entite'){ const e=EVTS.find(d=>d.e===opt); return e?GC[e.g]:'#888'; }
  return '#888';
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');

}

    const el=document.getElementById('ev-list');
    if(el) el.dataset.page='0';
    buildPickers(); buildVis(); buildList();
  }
}

// ── SIDEBAR BUILDERS ─────────────────────────────
function buildPickers(){
  // Group colors
  let el=document.getElementById('gc-pickers'); el.innerHTML='';
  Object.entries(GC).forEach(([g,c])=>{
    const row=document.createElement('div'); row.className='color-row';
    row.innerHTML=`<span class="color-label"><div class="color-dot" style="background:${c}"></div>${g}</span>
      <input type="color" class="color-input" value="${c}" onchange="GC['${g}']=this.value;render();buildPickers()">`;
    el.appendChild(row);
  });
  // Type colors
  el=document.getElementById('tc-pickers'); el.innerHTML='';
  Object.entries(TC).forEach(([t,v])=>{
    const row=document.createElement('div'); row.className='color-row';
    row.innerHTML=`<span class="color-label"><div class="color-dot" style="background:${v.c}"></div>${t}</span>
      <input type="color" class="color-input" value="${v.c}" onchange="updateTypeColor('${t}',this.value)">`;
    el.appendChild(row);
  });
}
function updateTypeColor(t,c){
  TC[t].c=c;
  // derive bg and tx from hue
  TC[t].bg=c+'18'; TC[t].tx=c;
  render(); buildPickers();
}
function buildVis(){
  const el=document.getElementById('vis-togs'); el.innerHTML='';
  Object.entries(GC).forEach(([g,c])=>{
    const on=!hidden.has(g);
    const row=document.createElement('div'); row.className='tog-row';
    row.innerHTML=`<span class="tog-label"><div class="color-dot" style="background:${c}"></div>${g}</span>
      <div class="tog ${on?'on':''}" onclick="toggleGroup('${g}')"></div>`;
    el.appendChild(row);
  });
}
function toggleGroup(g){
  hidden.has(g)?hidden.delete(g):hidden.add(g);
  buildVis(); render();
}
function buildList(){
  const el      = document.getElementById('ev-list');
  const search  = (document.getElementById('ev-search')?.value||'').toLowerCase().trim();
  const fGroupe = document.getElementById('ev-f-groupe')?.value||'';
  const fMois   = parseInt(document.getElementById('ev-f-mois')?.value)||0;
  const fType   = document.getElementById('ev-f-type')?.value||'';

  let list = EVTS.filter(ev=>{
    if(fGroupe && ev.g !== fGroupe) return false;
    if(fMois   && ev.m !== fMois)   return false;
    if(fType   && ev.t !== fType)   return false;
    if(search  && !ev.n.toLowerCase().includes(search) &&
                  !(ev.bu||'').toLowerCase().includes(search) &&
                  !(ev.e||'').toLowerCase().includes(search)) return false;
    return true;
  });

  const total    = list.length;
  const pageSize = 25;
  const page     = parseInt(el.dataset.page||'0');
  const maxPage  = Math.max(0, Math.ceil(total/pageSize)-1);
  const curPage  = Math.min(page, maxPage);
  const start    = curPage * pageSize;
  const shown    = list.slice(start, start+pageSize);

  document.getElementById('ev-cnt').textContent =
    search||fGroupe||fMois||fType
      ? `(${total} résultats / ${EVTS.length} total)`
      : `(${EVTS.length} événements)`;

  el.innerHTML = '';
  el.dataset.page = curPage;

  if(!total){
    el.innerHTML='<div style="text-align:center;color:var(--sub2);font-size:11px;padding:16px 0">Aucun résultat</div>';
    return;
  }

  shown.forEach(ev=>{
    const tc = TC[ev.t]||TC['Congrès'];
    const gc = GC[ev.g]||'#888';
    const item = document.createElement('div');
    item.className='eli';
    item.innerHTML=`
      <div class="eli-dot" style="background:${tc.c}"></div>
      <div class="eli-info">
        <div class="eli-name">${ev.n}</div>
        <div class="eli-meta">
          <span style="color:${gc};font-weight:600">${ev.g}</span>${ev.bu?' · '+ev.bu:''}${ev.e?' · '+ev.e:''}
          · ${MN[ev.m-1]} · <span style="color:${tc.c}">${ev.t}</span>
        </div>
      </div>
      <div class="eli-actions">
        <button class="eli-btn edit" onclick="openEdit(${ev.id})" title="Modifier">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M7.5 1.5l2 2-6 6H1.5v-2l6-6z"/></svg>
        </button>
        <button class="eli-btn" onclick="delEv(${ev.id})" title="Supprimer">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 3h8M4 3V2h3v1M9 3l-.7 6.5a.5.5 0 01-.5.5H3.2a.5.5 0 01-.5-.5L2 3"/></svg>
        </button>
      </div>`;
    el.appendChild(item);
  });

  if(total > pageSize){
    const pages = Math.ceil(total/pageSize);
    const nav   = document.createElement('div');
    nav.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:8px 2px;margin-top:8px;border-top:1px solid var(--b1)';
    nav.innerHTML=`
      <button onclick="listPage(${curPage-1})" ${curPage===0?'disabled':''}
        style="padding:3px 10px;border:1px solid var(--b1);border-radius:6px;background:var(--white);font-size:10.5px;cursor:pointer;color:var(--sub);opacity:${curPage===0?'.3':'1'}">
        ← Préc.
      </button>
      <span style="font-size:10px;color:var(--sub2)">${start+1}–${Math.min(start+pageSize,total)} sur ${total}</span>
      <button onclick="listPage(${curPage+1})" ${curPage>=pages-1?'disabled':''}
        style="padding:3px 10px;border:1px solid var(--b1);border-radius:6px;background:var(--white);font-size:10.5px;cursor:pointer;color:var(--sub);opacity:${curPage>=pages-1?'.3':'1'}">
        Suiv. →
      </button>`;
    el.appendChild(nav);
  }
}

function listPage(p){
  const el = document.getElementById('ev-list');
  el.dataset.page = Math.max(0, p);
  buildList();
}

// ── CRUD ──────────────────────────────────────────
function addEv(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){document.getElementById('f-name').focus();return;}
  EVTS.push({
    id:nxtId++,
    g:document.getElementById('f-g').value,
    bu:document.getElementById('f-bu').value.trim(),
    n:name,
    m:parseInt(document.getElementById('f-m').value),
    t:document.getElementById('f-t').value
  });
  document.getElementById('f-name').value='';
  document.getElementById('f-bu').value='';
  buildList(); render();
  toast('Événement ajouté');
}
function delEv(id){
  EVTS=EVTS.filter(e=>e.id!==id);
  buildList(); render(); toast('Événement supprimé');
}
function openEdit(id){
  const ev=EVTS.find(e=>e.id===id); if(!ev) return;
  editId=id;
  document.getElementById('m-name').value=ev.n;
  document.getElementById('m-mon').value=ev.m;
  document.getElementById('m-type').value=ev.t;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); editId=null; }
function saveEdit(){
  const ev=EVTS.find(e=>e.id===editId); if(!ev) return;
  ev.n=document.getElementById('m-name').value.trim()||ev.n;
  ev.m=parseInt(document.getElementById('m-mon').value);
  ev.t=document.getElementById('m-type').value;
  closeModal(); buildList(); render(); toast('Événement mis à jour');
}

// ── TABS & CHIPS ─────────────────────────────────
function initTabs(){
  const bar=document.getElementById('fbar');
  bar.innerHTML='';
  TABS.forEach(tab=>{
    const el=document.createElement('div');
    el.className='ftab'+(tab.id===activeTab?' on':''); el.id='ft-'+tab.id;
    el.innerHTML=`<span class='tab-icon'>${tab.icon}</span>${tab.lbl}`;
    el.onclick=()=>{
      activeTab=tab.id; selected=new Set();
      document.querySelectorAll('.ftab').forEach(x=>x.classList.remove('on'));
      el.classList.add('on'); renderChips(); render();
    };
    bar.appendChild(el);
  });
}
function renderChips(){
  const bar=document.getElementById('cbar'); bar.innerHTML='';
  const tab=TABS.find(t=>t.id===activeTab);
  if(!tab.opts){bar.innerHTML='<span class="cbar-hint">Toutes les activités du groupe H&S</span>';return;}
  const opts=tab.opts();
  if(!opts.length){bar.innerHTML='<span class="cbar-hint">Aucun élément</span>';return;}

  // For entite: add a small search input first
  if(tab.id==='entite'){
    const wrap = document.createElement('div');
    wrap.style.cssText='display:flex;align-items:center;gap:8px;width:100%;flex-wrap:wrap;';
    const inp = document.createElement('input');
    inp.id='chip-search';
    inp.placeholder='Rechercher une entité…';
    inp.style.cssText='padding:3px 9px;border:1px solid var(--b1);border-radius:6px;font-family:Inter,sans-serif;font-size:11px;outline:none;background:var(--white);color:var(--text);width:170px;';
    inp.oninput=()=>renderChips();
    wrap.appendChild(inp);
    bar.appendChild(wrap);
  }

  const search = document.getElementById('chip-search')?.value?.toLowerCase()||'';
  const filtered_opts = search ? opts.filter(o=>o.toLowerCase().includes(search)) : opts;

  filtered_opts.forEach(opt=>{
    const c=optColor(tab.id,opt);
    const chip=document.createElement('div');
    chip.className='chip '+(selected.has(opt)?'on':'off');
    chip.textContent=opt;
    chip.style.cssText=`color:${c};border-color:${c};background:${c}11;`;
    chip.onclick=()=>{selected.has(opt)?selected.delete(opt):selected.add(opt);renderChips();render();};
    bar.appendChild(chip);
  });
}

// ── RENDER ───────────────────────────────────────
function render(){
  const data=filtered();
  renderKPIs(data); renderDensity(data);
  renderAxis(data); renderEvents(data);
  if(zoomedM) renderZoom(data,zoomedM); else document.getElementById('zpanel').className='zpanel';
  renderLegend();
}

function renderKPIs(data){
  const byT={};
  data.forEach(d=>byT[d.t]=(byT[d.t]||0)+1);
  const top=Object.entries(byT).sort((a,b)=>b[1]-a[1]).slice(0,3);
  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="kpi-v">${data.length}</div><div class="kpi-l">Activités</div></div>
    ${top.map(([t,n])=>`<div class="kpi"><div class="kpi-v" style="color:${TC[t]?.c||'#888'}">${n}</div><div class="kpi-l">${t}</div></div>`).join('')}`;
}

function renderDensity(data){
  const cnts=Array(12).fill(0); data.forEach(d=>cnts[d.m-1]++);
  const mx=Math.max(...cnts,1);
  const el=document.getElementById('dcols'); el.innerHTML='';
  MN.forEach((mon,i)=>{
    const pct=cnts[i]/mx, isN=(i+1)===NOW, isZ=(i+1)===zoomedM;
    const sat=Math.round(40+pct*45), lit=Math.round(72-pct*38);
    const fill=cnts[i]>0?`hsl(220,${sat}%,${lit}%)`:'#e8edf5';
    const col=document.createElement('div');
    col.className='dc'+(isZ?' hi':'');
    col.innerHTML=`
      <div style="flex:1;display:flex;align-items:flex-end;width:100%">
        <div class="dc-bar" style="height:${Math.max(pct*100,4)}%;background:${fill};${isN?'outline:2px solid #2a5298;outline-offset:1px':''}"></div>
      </div>
      <div class="dc-n" style="${isN?'color:#2a5298':''}">${mon}</div>
      <div class="dc-c">${cnts[i]||''}</div>`;
    col.onclick=()=>toggleZoom(i+1);
    el.appendChild(col);
  });
}

function renderAxis(data){
  const cnts=Array(12).fill(0); data.forEach(d=>cnts[d.m-1]++);
  const el=document.getElementById('axis'); el.innerHTML='';
  MN.forEach((mon,i)=>{
    const m=i+1,isN=m===NOW,isZ=m===zoomedM;
    const div=document.createElement('div');
    div.className='am'+(isN?' now':'')+(isZ?' zoom':'');
    div.innerHTML=`<div class="am-tk" style="height:${isN?16:9}px"></div>
      <div class="am-n">${mon}</div>
      ${isN?'<div class="now-pip"></div>':''}
      <div class="am-c">${cnts[i]?cnts[i]+' act.':''}</div>`;
    div.onclick=()=>toggleZoom(m);
    el.appendChild(div);
  });
}

function renderEvents(data){
  const byM=Array.from({length:12},()=>[]);
  data.forEach(d=>byM[d.m-1].push(d));
  const CAP=5, grid=document.getElementById('egrid'); grid.innerHTML='';
  byM.forEach((evts,i)=>{
    const m=i+1,isN=m===NOW,isZ=m===zoomedM;
    const col=document.createElement('div');
    col.className='mc'+(isN?' now':'')+(isZ?' zoom':'');
    col.onclick=()=>toggleZoom(m);
    evts.slice(0,CAP).forEach((ev,idx)=>{
      const tc=TC[ev.t]||TC['Congrès'], gc=GC[ev.g]||'#888';
      const pill=document.createElement('div');
      pill.className='ep';
      pill.style.cssText=`background:${tc.bg};border-color:${tc.c};color:${tc.tx};animation-delay:${idx*.03}s`;
      pill.textContent=ev.n;
      pill.addEventListener('mouseenter',e=>showTip(e,ev));
      pill.addEventListener('mouseleave',hideTip);
      pill.addEventListener('click',e=>e.stopPropagation());
      col.appendChild(pill);
    });
    if(evts.length>CAP){
      const m2=document.createElement('div');
      m2.className='ep-more'; m2.textContent=`+${evts.length-CAP} autres`;
      col.appendChild(m2);
    }
    grid.appendChild(col);
  });
}

function toggleZoom(m){ zoomedM=zoomedM===m?null:m; render(); }

function renderZoom(data,m){
  const evts=data.filter(d=>d.m===m);
  const panel=document.getElementById('zpanel');
  if(!evts.length){panel.className='zpanel';return;}
  panel.className='zpanel open';
  panel.innerHTML=`<div class="zh">
    <div class="zt">${MNF[m-1]} 2026 <span class="zs">${evts.length} activité${evts.length>1?'s':''}</span></div>
    <button class="zbtn" onclick="zoomedM=null;render()"><svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 1l7 7M8 1L1 8"/></svg> Fermer</button>
  </div><div class="zgrid" id="zg"></div>`;
  const grid=document.getElementById('zg');
  evts.forEach((ev,idx)=>{
    const tc=TC[ev.t]||TC['Congrès'], gc=GC[ev.g]||'#888';
    const card=document.createElement('div');
    card.className='zc'; card.style.cssText=`border-top-color:${tc.c};animation-delay:${idx*.02}s`;
    card.innerHTML=`<div class="zc-n">${ev.n}</div>
      <div class="zc-m">
        <span class="zb" style="background:${gc}15;color:${gc}">${ev.g}</span>
        ${ev.bu?`<span class="zb" style="background:#f0f3f8;color:#6b7a99">${ev.bu}</span>`:''}
        <span class="zb" style="background:${tc.bg};color:${tc.tx}">${ev.t}</span>
      </div>`;
    card.addEventListener('mouseenter',e=>showTip(e,ev));
    card.addEventListener('mouseleave',hideTip);
    grid.appendChild(card);
  });
}

function renderLegend(){
  document.getElementById('legend').innerHTML=`<span class="leg-t">Types :</span>
    ${Object.entries(TC).map(([t,v])=>`<div class="leg"><div class="leg-d" style="background:${v.c}"></div>${t}</div>`).join('')}
    <span style="margin-left:auto;font-size:9.5px;color:var(--sub2)">Cliquer sur un mois pour voir le détail</span>`;

// ── XLSX IMPORT ──────────────────────────────────
function importXLSX(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = ''; // reset so same file can be re-imported

  // Show overlay loading
  document.getElementById('import-overlay').classList.add('open');
  document.getElementById('import-spinner').style.display = 'block';
  document.getElementById('import-title').textContent = 'Lecture du fichier…';
  document.getElementById('import-sub').textContent = 'Analyse de la feuille "Planning Groupe 2026"';
  document.getElementById('import-stats').style.display = 'none';
  document.getElementById('import-err').textContent = '';
  document.getElementById('import-close').style.display = 'none';

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});

      // Find planning sheet
      const sheetName = wb.SheetNames.find(s =>
        s.toLowerCase().includes('planning groupe') || s.toLowerCase().includes('planning 2026')
      );
      if (!sheetName) throw new Error('Feuille "Planning Groupe 2026" introuvable.\nFeuilles disponibles : ' + wb.SheetNames.join(', '));

      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});

      // Validate header row
      const header = (rows[0] || []).map(v => v ? String(v).trim() : '');
      const hasMonths = ['Jan','Fév','Fev','Mar','Avr','Mai','Juin'].some(m =>
        header.some(h => h && h.toLowerCase().includes(m.toLowerCase()))
      );
      if (!hasMonths) throw new Error('Format non reconnu : colonnes de mois introuvables.\nVérifiez que la ligne 1 contient Jan, Fév, Mar…');

      // Find month column indices (cols 4-15 by default, but detect from header)
      let mOffset = 4;
      for (let i = 0; i < header.length; i++) {
        if (header[i] && (header[i].toLowerCase().startsWith('jan'))) {
          mOffset = i; break;
        }
      }

      const STOP_WORDS = ['congrès','affichage','campagne','lancement','tr:','ev: evenements',
                          'offres','post prévu','activations','légende','legend'];

      function getType(name) {
        const n = name.trim();
        const low = n.toLowerCase();
        if (low.startsWith('ev:') || ['inauguration','roadshow','spectacle','jazzablanca',
            'nostalgia','golf','padel','icebike','caftan','trophee','semaine du cheval',
            'pop up','soirée lancement','ouverture','bollywood','btob','rose royal',
            'sherlock','belle et','capone','satanas','7 cup','iscae','porteur',
            "j'aimerais",'andalussyat','santa','carmen','8m2','atelier b2c','rassemblement',
            'remise de diplome','remise diplome'].some(k => low.includes(k))) return 'Événement';
        if (['congrès','congres','workshop','forum','journée','journee','logis med','logiterre',
             'gitex','whx','cphi','officine pharma','medica trade','pharmexpo',
             'smnc','smacot','wca2026','ambm','smalmi','ambrg','smamm','smb ','jpfsa',
             'seenergy','grain & milling','alhokama','smo','amcar','amoc','cardio sud',
             'afomek','fon ','apei','smc','amicale','amu','codepca','para expo',
             'jdm','adepra','smd ','beauty plus','acor','acop','aopr','smorl','srmgo',
             'agp','agsmf','afmapath','al amal','jiop','agon','amef','jpit','acp ',
             'asmpr','smedian','smsl','smcc','antlm','génétique','pathologie digitale',
             'fertilité','hémato','apa ','sigma','heart','ammf','aes','samir-ophta',
             'kebbaj','somachir','somipev','reso ','assed','ehealth','salons btob',
             'maroc hotel'].some(k => low.includes(k))) return 'Congrès';
        if (low.startsWith('tr:') || low.startsWith('tr :')) return 'Événement';
        if (low.startsWith('post') && low.length < 80) return 'Activation';
        if (low.startsWith('campagne') || low.includes('campagne ')) return 'Campagne';
        if (low.startsWith('lancement') || low.includes('lancement ')) return 'Lancement';
        if (low.startsWith('affichage')) return 'Affichage';
        if (low.startsWith('offre') || low.includes('offre ')) return 'Offre';
        if (low.startsWith('activation')) return 'Activation';
        return 'Autre';
      }

      function cleanName(name) {
        return name.trim()
          .replace(/^(EV:|ev:|congrès\s*:|congrès\s|congres\s*:)/i, '')
          .replace(/\s+/g, ' ').trim().slice(0, 85);
      }

      const newEvents = [];
      let newId = 1;
      let curG = null, curBU = null, curE = null;

      for (let ri = 1; ri < rows.length; ri++) {
        const row = rows[ri];
        if (!row || !row.some(v => v !== null)) continue;

        const g   = row[0] ? String(row[0]).trim() : null;
        const bu  = row[1] ? String(row[1]).trim() : null;
        const ent = row[2] ? String(row[2]).trim() : null;
        const fil = row[3] ? String(row[3]).trim() : null;

        // Skip legend rows
        if (g && STOP_WORDS.some(s => g.toLowerCase().startsWith(s))) continue;

        // Update hierarchy
        if (g) { curG = g; if (!bu) curBU = null; if (!ent) curE = null; }
        if (bu)  curBU = bu;
        if (ent) curE  = ent;
        const fullE = [curE, fil].filter(Boolean).join(' — ');

        // Parse 12 month columns
        for (let mi = 0; mi < 12; mi++) {
          const val = row[mOffset + mi];
          if (val === null || val === undefined) continue;
          const raw = String(val).replace(/\n/g, ' ').trim();
          if (!raw) continue;
          newEvents.push({
            id: newId++,
            g:  curG || 'H&S Group',
            bu: curBU || '',
            e:  fullE,
            n:  cleanName(raw),
            m:  mi + 1,
            t:  getType(raw)
          });
        }
      }

      if (newEvents.length === 0) throw new Error('Aucun événement trouvé.\nVérifiez que le fichier n\'est pas vide.');

      // Replace dataset
      EVTS = newEvents;
      nxtId = newId + 1;

      // Reset state
      activeTab = 'all';
      selected  = new Set();
      zoomedM   = null;
      hidden    = new Set();

      // Stats by type
      const byT = {};
      newEvents.forEach(e => byT[e.t] = (byT[e.t]||0)+1);
      const statsHtml = Object.entries(byT).sort((a,b)=>b[1]-a[1]).map(([t,n]) =>
        `<div class="import-stat"><div class="import-stat-v">${n}</div><div class="import-stat-l">${t}</div></div>`
      ).join('');

      // Show success
      document.getElementById('import-spinner').style.display = 'none';
      document.getElementById('import-title').innerHTML = '<span class="import-ok">✓</span> Import réussi';
      document.getElementById('import-sub').textContent  = `${newEvents.length} activités chargées depuis "${sheetName}"`;
      document.getElementById('import-stats').innerHTML  = statsHtml;
      document.getElementById('import-stats').style.display = 'flex';
      document.getElementById('import-close').style.display = 'block';

      // Re-render everything
      document.getElementById('fbar').innerHTML = '';
      activeTab='all'; selected=new Set(); zoomedM=null;
      initTabs();
      renderChips();
      if(sideOpen){
    const el=document.getElementById('ev-list');
    if(el) el.dataset.page='0';
    buildPickers(); buildVis(); buildList();
  }
      render();

    } catch(err) {
      document.getElementById('import-spinner').style.display = 'none';
      document.getElementById('import-title').textContent = 'Erreur d\'import';
      document.getElementById('import-sub').textContent   = '';
      document.getElementById('import-err').textContent   = err.message;
      document.getElementById('import-close').style.display = 'block';
    }
  };
  reader.readAsArrayBuffer(file);
}

function closeImport() {
  document.getElementById('import-overlay').classList.remove('open');
}

// ── EXPORT XLSX ──────────────────────────────────
function exportXLSX() {
  const wb = XLSX.utils.book_new();

  // ── Planning sheet ──
  const MONTHS = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sept','Oct','Nov','Déc'];
  const header = ['Groupe','BU','Entité','Filiales',...MONTHS];

  // Group events by row key (g+bu+e) and month
  const rowMap = new Map();
  EVTS.forEach(ev => {
    const key = `${ev.g}||${ev.bu}||${ev.e}`;
    if (!rowMap.has(key)) rowMap.set(key, {g:ev.g, bu:ev.bu, e:ev.e, months: Array(12).fill('')});
    const row = rowMap.get(key);
    const existing = row.months[ev.m - 1];
    row.months[ev.m - 1] = existing ? existing + ' / ' + ev.n : ev.n;
  });

  const aoa = [header];
  rowMap.forEach(row => {
    aoa.push([row.g, row.bu, row.e, '', ...row.months]);
  });

  // Add empty rows for future entries
  for (let i = 0; i < 10; i++) aoa.push(Array(16).fill(''));

  const ws = XLSX.utils.aoa_to_sheet(aoa);

  // Column widths
  ws['!cols'] = [
    {wch:15},{wch:13},{wch:14},{wch:12},
    ...Array(12).fill({wch:24})
  ];

  XLSX.utils.book_append_sheet(wb, ws, 'Planning Groupe 2026');

  // ── Legend sheet ──
  const legData = [
    ["GUIDE D'UTILISATION — H&S Group Planning 2026"],
    [],
    ["COLONNES", "Description"],
    ["A — Groupe",   "H&S Group / Dislog Group / LVE Group / One Retail"],
    ["B — BU",       "Healthcare, Food, Hygiène, Restauration, Beauty, Lifestyle, Bricolage…"],
    ["C — Entité",   "DMD, ERAMEDIC, MEGAFLEX, Steripharma, KPH, Venezia, Mr.Bricolage…"],
    ["D — Filiales", "Sous-entité si applicable (Kaline, SCOMEDICA…)"],
    ["E→P — Mois",   "Une activité par cellule. Utiliser les préfixes définis ci-dessous."],
    [],
    ["PRÉFIXES","Exemples"],
    ["Congrès:",   "Congrès: WHX Dubai  /  Congrès CPHI  /  Congrès GITEX"],
    ["EV:",        "EV: Jazzablanca  /  EV: Caftan Week  /  EV: Satanas & Mordicus"],
    ["Campagne",   "Campagne ISO  /  Campagne Chauffage  /  Campagne Neovis"],
    ["Lancement",  "Lancement site web  /  Lancement Rebranding"],
    ["Affichage",  "Affichage EDITA  /  Affichage ACE Mega Brand"],
    ["Offre",      "Offre Ramadan  /  Offre Saint Valentin  /  Offre Solde Chauffage"],
    ["Activation", "Activation Glovo  /  Activation Icebike"],
    ["TR:",        "TR: Diabalex Meknès  /  TR: URO Flonox  (Table Ronde)"],
    ["Post",       "Post journée de la femme  /  Post Ramadan  (Réseaux sociaux)"],
    [],
    ["RÈGLES"],
    ["• Hiérarchie Groupe/BU/Entité héritée vers le bas — laisser vide si identique à la ligne précédente."],
    ["• Une cellule mois = une activité. Plusieurs activités le même mois → ajouter une ligne."],
    ["• Ne pas modifier les noms de colonnes ni le nom de la feuille."],
    ["• Importer via le bouton 'Importer Excel' dans le dashboard pour mettre à jour."],
  ];
  const wsLeg = XLSX.utils.aoa_to_sheet(legData);
  wsLeg['!cols'] = [{wch:18},{wch:70}];
  XLSX.utils.book_append_sheet(wb, wsLeg, 'Légende & Guide');

  // Download
  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `HS_Planning_2026_${date}.xlsx`);
  toast('Export Excel téléchargé');
}
